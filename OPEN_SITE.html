<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wandering Bar - Preview Launcher</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f7f2;
            color: #2d241e;
            text-align: center;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
        }
        h1 { color: #c27803; margin-top: 0; }
        p { line-height: 1.6; color: #5c4d42; }
        .button {
            display: inline-block;
            background-color: #c27803;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 2rem;
            font-weight: bold;
            margin-top: 1rem;
            transition: background-color 0.2s;
        }
        .button:hover { background-color: #a06302; }
        .status {
            font-size: 0.8rem;
            margin-top: 1.5rem;
            color: #a89a8e;
            font-style: italic;
        }
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Wandering Bar</h1>
        <p>Klik op de knop hieronder om je site live te bekijken op poort 8080.</p>
        
        <a href="http://localhost:8080" class="button">Open Live Site</a>

        <p class="status">
            Let op: Zorg dat je eerst <code>npm run dev</code> hebt gestart in je terminal!
        </p>
    </div>

    <script>
        // Optioneel: Automatisch doorsturen na 2 seconden
        // window.location.href = "http://localhost:8080";
    </script>
</body>
</html>
